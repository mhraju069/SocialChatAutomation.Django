map $http_origin $cors_origin {
    default "";
    "~^https://(wahejan\.vercel\.app|localhost:3000)$" $http_origin;
}

server {
    listen 80;
    server_name api.verseai.nl localhost;
    
    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.verseai.nl;

    ssl_certificate /etc/letsencrypt/live/api.verseai.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.verseai.nl/privkey.pem;

    client_max_body_size 1048576M;

    # Global CORS headers added to every response
    add_header 'Access-Control-Allow-Origin'      $cors_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers'     'Accept, Authorization, Content-Type, Origin, X-Requested-With, x-client-info, ngrok-skip-browser-warning' always;
    add_header 'Access-Control-Max-Age'           '3600' always;

    # Handle OPTIONS preflight requests immediately — no proxy needed
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # Serve static files
    location /static/ {
        alias /app/staticfiles/;
    }

    # Serve media files
    location /media/ {
        alias /app/media/;
    }

    # WebSocket proxy
    location /ws/ {
        proxy_pass http://web:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Regular HTTP proxy for Backend
    location / {
        proxy_pass http://web:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
